services:
  actual-rest-api:
    build: .
    image: actual-rest-api
    container_name: actual-rest-api
    ports:
      - 3010:3010
    volumes:
      - ./data/prod/actual-api:/app/.actual-cache
    working_dir: /app
    command: npm start
    environment:
      - DB_TYPE=postgres
      - PORT=3010
      - NODE_ENV=${NODE_ENV}
      - TRUST_PROXY=${TRUST_PROXY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_SYNC_ID=${ACTUAL_SYNC_ID}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://localhost:3010/v2/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.actual-budget-api-web.rule=Host(`api-budget.fluxzone.com.br`)
      - traefik.http.routers.actual-budget-api-web.entrypoints=web
      - traefik.http.services.actual-budget-api-web.loadbalancer.server.port=3010
      - traefik.http.routers.actual-budget-api-web.service=actual-budget-api-web
      - traefik.http.routers.actual-budget-api-web.middlewares=redirect-to-https@file
      - traefik.http.routers.actual-budget-api-websecure.rule=Host(`api-budget.fluxzone.com.br`)
      - traefik.http.routers.actual-budget-api-websecure.entrypoints=websecure
      - traefik.http.services.actual-budget-api-websecure.loadbalancer.server.port=3010
      - traefik.http.routers.actual-budget-api-websecure.service=actual-budget-api-websecure
      - traefik.http.routers.actual-budget-api-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true
    networks:
      - dokploy-network
      - default

  redis:
    image: redis:7-alpine
    container_name: actual-rest-api-redis
    ports:
      - 6379:6379
    volumes:
      - ./data/prod/redis:/data
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server --appendonly yes
      fi"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: actual-rest-api-postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ./data/prod/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

