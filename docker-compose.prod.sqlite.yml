services:
  actual-rest-api:
    build: .
    image: actual-rest-api
    container_name: actual-rest-api
    user: "root"
    ports:
      - "3010:3010"
    volumes:
      - actual-api-data:/app/.actual-cache
    working_dir: /app
    command: npm start
    environment:
      - DB_TYPE=sqlite
      - PORT=3010
      - HOST=0.0.0.0
      - NODE_ENV=production
      - TRUST_PROXY=true
      - ALLOWED_ORIGINS=https://api-budget.fluxzone.com.br
      - REDIS_HOST=redis # <-- MUDANÇA AQUI: Liga a API ao Redis
      
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_SYNC_ID=${ACTUAL_SYNC_ID}
      - ACTUAL_SYNC_PASSWORD=${ACTUAL_SYNC_PASSWORD}
      
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3010/v2/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.actual-api.rule=Host(`api-budget.fluxzone.com.br`)"
      - "traefik.http.routers.actual-api.entrypoints=websecure"
      - "traefik.http.routers.actual-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.actual-api.loadbalancer.server.port=3010"
    networks:
      - dokploy-network
      - default

  redis:
    image: redis:7-alpine
    container_name: actual-rest-api-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data # <-- MUDANÇA AQUI: Volume Nomeado
    command: redis-server --appendonly yes
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

# <-- ESTA SECÇÃO DIZ AO DOCKER PARA CRIAR OS VOLUMES
volumes:
  actual-api-data:
  redis-data:
