services:
  actual-rest-api:
    build: .
    image: actual-rest-api
    container_name: actual-rest-api
    ports:
      - "3010:3010"
    volumes:
      - ./data/prod/actual-api:/app/.actual-cache
    working_dir: /app
    command: npm start
    environment:
      - DB_TYPE=sqlite
      - PORT=3010
      - HOST=0.0.0.0 # <-- OBRIGA A API A ACEITAR CONEXÕES DE FORA
      - NODE_ENV=production
      - TRUST_PROXY=true
      - ALLOWED_ORIGINS=https://api-budget.fluxzone.com.br
      
      # Certifique-se de que estas variáveis existem na aba "Environment"
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - ACTUAL_SERVER_URL=${ACTUAL_SERVER_URL}
      - ACTUAL_PASSWORD=${ACTUAL_PASSWORD}
      - ACTUAL_SYNC_ID=${ACTUAL_SYNC_ID}
      
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --no-verbose --tries=1 --spider http://127.0.0.1:3010/v2/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: actual-rest-api-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/prod/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
